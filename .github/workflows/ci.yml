name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generator:
    name: generator (tests + typecheck + drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: install pinned ruff (generated-Python formatting is part of byte determinism)
        run: pip install ruff==0.15.20
      - name: generator typecheck + vitest (gen-ir + emit-ts + emit-py suites)
        run: pnpm --filter @anyapi/generator run check
      - name: regen drift (ir.json + fixtures.json + both generated trees byte-identical)
        run: pnpm run generate:check

  typescript:
    name: typescript (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc strict + vitest (incl per-SKU fixture sweep) + tsup build + consumer-artifact typecheck
        run: pnpm --filter @getanyapi/sdk run check
      - name: consumer-artifact typecheck (packed dist typing gate, B2)
        run: pnpm --filter @getanyapi/sdk run consumer-typecheck

  python:
    name: python (pyright + mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/python[dev]"
      - name: pyright (src/getanyapi incl generated platforms)
        run: pyright
        working-directory: packages/python
      - name: mypy --strict (src/getanyapi incl generated platforms)
        run: mypy
        working-directory: packages/python
      - name: pytest (runtime + per-SKU fixture sweep)
        run: pytest
        working-directory: packages/python

  guards:
    name: guards (dash guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: dash guard (ASCII hyphen only; openapi.json + catalog.json exempt)
        run: bash scripts/check-dashes.sh
