name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generator:
    name: generator (tests + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: generator typecheck + tests
        run: pnpm --filter @anyapi/generator run check

  typescript:
    name: typescript (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc strict + vitest + tsup build
        run: pnpm --filter @anyapi/sdk run check

  python:
    name: python (pyright + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/python[dev]"
      - name: pyright
        run: pyright
        working-directory: packages/python
      - name: mypy --strict
        run: mypy
        working-directory: packages/python
      - name: pytest
        run: pytest
        working-directory: packages/python

  drift:
    name: regen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: regenerate and assert no diff
        # TODO(Phase 1 gen-ir): `pnpm generate` from the committed openapi.json snapshot,
        # then `git diff --exit-code` over generated output (byte-identical determinism).
        run: |
          echo "TODO: pnpm generate && git diff --exit-code"

  dashes:
    name: no em/en dashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assert ASCII hyphen only (openapi.json snapshot exempt)
        # The upstream openapi.json snapshot may carry em dashes; emitted + handwritten
        # files must not. See SPEC.md hard rule 3.
        run: |
          if git grep -nP "[\x{2013}\x{2014}]" -- ':!openapi.json' ; then
            echo "found em/en dash in tracked files (ASCII hyphen only)"; exit 1
          fi
          echo "ok: no em/en dashes"
